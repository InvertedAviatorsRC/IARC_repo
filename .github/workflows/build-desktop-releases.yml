name: Build desktop downloads

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release version, such as v0.1.0. Leave blank to test the builds only."
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Windows x64
            runner: windows-latest
            command: powershell -ExecutionPolicy Bypass -File scripts/build_windows_app.ps1
            asset: release/GPS-Telemetry-Visualizer-Windows-x64.zip
          - label: macOS Apple Silicon
            runner: macos-15
            command: bash scripts/build_macos_app.sh
            asset: release/GPS-Telemetry-Visualizer-macOS-Apple-Silicon.zip
          - label: macOS Intel
            runner: macos-15-intel
            command: bash scripts/build_macos_app.sh
            asset: release/GPS-Telemetry-Visualizer-macOS-Intel.zip

    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: python -m pip install --upgrade pip

      - name: Install app
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Build downloadable app
        run: ${{ matrix.command }}

      - name: Upload downloadable app
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.label }}
          path: ${{ matrix.asset }}
          archive: false
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download release files
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true
          skip-decompress: true

      - name: Verify release files
        run: ls -lh release-assets

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.release_tag || github.ref_name }}
        run: gh release create "$RELEASE_TAG" release-assets/*.zip --repo "$GITHUB_REPOSITORY" --target "$GITHUB_SHA" --generate-notes --title "GPS Telemetry Visualizer $RELEASE_TAG"
